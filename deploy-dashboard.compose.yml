services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: yangyuen_dashboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d yangyuen_dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dashboard_internal

  app:
    image: ${IMAGE_REPO:-yangyuen-dashboard}:${TAG:-latest}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/yangyuen_dashboard
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    networks:
      dashboard_internal:
      caddy_proxy:
        aliases:
          - yangyuen-dashboard-app

  migrate:
    image: node:22-alpine
    profiles:
      - tools
    working_dir: /workspace
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/yangyuen_dashboard
    command: sh -c "npm ci --ignore-scripts && npx prisma migrate deploy"
    volumes:
      - ./migrate-src:/workspace
    networks:
      - dashboard_internal

volumes:
  postgres_data:
  migrate_node_modules:

networks:
  dashboard_internal:
  caddy_proxy:
    external: true
    name: yangyuen_default
